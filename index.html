<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080A12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8FAFF" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Baishakhi · UI / Product Designer. Selected work, case studies, and contact." />

    <title>Baishakhi · UI Designer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />

    <script>
      // pre-paint: stored preference wins; otherwise dark is the brand default
      // (OS prefers-color-scheme intentionally ignored). Must be inline + first.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored || "dark";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (_) {
          // localStorage blocked — fall back to brand default (dark)
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
